<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <!-- SEO GLOBAL -->
    <title>INS CLOUD — Brankas Digital Pribadi</title>
    <meta name="description" content="Simpan berkas Anda dengan aman di INS CLOUD. Sistem isolasi IP memastikan privasi total.">
    <meta name="author" content="INS IT Developer">
    <link rel="icon" type="image/png" href="https://${DOMAIN}/media/VyxgtLfLbfkOiMgJkM1BaAdhrjTATRPPsYLO">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050507; --card: #0d0d11; --primary: #fbbf24; --primary-glow: rgba(251, 191, 36, 0.15); --border: #1e1e24; --text: #ffffff; --dim: #71717a; }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        
        nav { 
            display: flex; gap: 8px; justify-content: center; background: rgba(13,13,17,0.95); 
            padding: 10px; border-radius: 20px; border: 1px solid var(--border); 
            width: fit-content; margin: 0 auto 30px; position: sticky; top: 15px; z-index: 9999; 
            backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        nav button { 
            background: none; border: none; color: var(--dim); padding: 12px 24px; 
            border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 14px; 
        }
        nav button.active { background: var(--primary); color: #000; box-shadow: 0 5px 15px var(--primary-glow); }

        .view-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 36px; 
            padding: 50px 30px; box-shadow: 0 40px 80px rgba(0,0,0,0.7); 
            display: none; animation: slideUp 0.5s ease-out; 
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 42px; font-weight: 800; text-align: center; margin: 0; letter-spacing: -2px; }
        .grad { background: linear-gradient(135deg, var(--primary) 0%, #fff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .uploader { margin-top: 40px; border: 2px dashed var(--border); border-radius: 30px; padding: 80px 20px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.01); }
        .uploader:hover { border-color: var(--primary); background: var(--primary-glow); }
        .uploader svg { width: 60px; height: 60px; color: var(--primary); margin-bottom: 25px; }

        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 18px 40px; border-radius: 18px; background: var(--primary); color: #000; font-weight: 800; border: none; cursor: pointer; width: 100%; font-size: 16px; margin-top: 25px; }
        .btn:disabled { opacity: 0.5; }

        .vault-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .item { background: #141418; border: 1px solid var(--border); border-radius: 28px; padding: 24px; transition: 0.3s; }
        .thumb { width: 100%; height: 150px; background: #000; border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }

        .badge { display: inline-block; padding: 8px 20px; background: var(--border); border-radius: 40px; font-size: 12px; color: var(--dim); margin-top: 40px; font-weight: 700; }
        footer { text-align: center; margin-top: auto; padding: 40px 0; color: var(--dim); font-size: 12px; }

        .prog-bar { display: none; margin-top: 25px; height: 8px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .prog-fill { height: 100%; width: 0%; background: var(--primary); }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <button onclick="tampil('home')" id="n-home">Beranda</button>
        <button onclick="tampil('upload')" id="n-upload">Unggah</button>
        <button onclick="tampil('vault')" id="n-vault">Brankas</button>
    </nav>

    <div id="v-home" class="view-card">
        <h1><span class="grad">INS CLOUD VAULT</span></h1>
        <p style="text-align:center; color:var(--dim); margin-top:20px; font-size:18px;">Penyimpanan digital masa depan. Berkas Anda terisolasi aman berdasarkan IP.</p>
        <div style="text-align:center"><div class="badge">IP: ${USER_IP}</div></div>
    </div>

    <div id="v-upload" class="view-card">
        <h3 style="text-align:center; margin:0">Simpan Berkas Baru</h3>
        <div class="uploader" onclick="document.getElementById('fi').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p id="la" style="font-weight:700">Pilih berkas untuk disimpan</p>
            <input type="file" id="fi" hidden>
        </div>
        <button id="upBtn" class="btn" style="display:none">UNGGAH SEKARANG</button>
        <div class="prog-bar" id="pr"><div class="prog-fill" id="ba"></div></div>
    </div>

    <div id="v-vault" class="view-card">
        <h3 style="margin:0; font-weight:800;">Brankas Pribadi</h3>
        <p style="font-size:12px; color:var(--dim); margin-bottom:25px">Hanya menampilkan aset dari koneksi ini.</p>
        <div id="li" class="vault-grid"></div>
    </div>

    <footer>
        &copy; 2026 <b>INS CLOUD</b> &bull; Managed by <b>INS_Sanjaya</b>
    </footer>
</div>

<script>
    // DATA DARI SERVER
    const _RAW = "__DATA__INJECT__";
    let _DATA = [];
    try {
        if(_RAW && !_RAW.includes("__DATA")) {
            _DATA = JSON.parse(decodeURIComponent(escape(atob(_RAW))));
        }
    } catch(e) {}

    // FUNGSI NAVIGASI GLOBAL (ANTI STUCK)
    window.tampil = function(id) {
        // Sembunyikan semua view
        document.querySelectorAll('.view-card').forEach(el => el.style.display = 'none');
        // Reset tombol navigasi
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
        
        // Tampilkan view yang dipilih
        const targetView = document.getElementById('v-' + id);
        const targetBtn = document.getElementById('n-' + id);
        
        if(targetView) targetView.style.display = 'block';
        if(targetBtn) targetBtn.classList.add('active');
        
        if(id === 'vault') renderVault();
    };

    const fi = document.getElementById('fi');
    const upBtn = document.getElementById('upBtn');

    if(fi) {
        fi.onchange = () => {
            if(fi.files[0]) {
                document.getElementById('la').innerText = fi.files[0].name;
                upBtn.style.display = 'flex';
            }
        };
    }

    if(upBtn) {
        upBtn.onclick = async () => {
            const formData = new FormData();
            formData.append("file", fi.files[0]);
            upBtn.disabled = true;
            document.getElementById('pr').style.display = 'block';

            const xhr = new XMLHttpRequest();
            xhr.upload.onprogress = (e) => {
                if(e.lengthComputable) document.getElementById('ba').style.width = (e.loaded/e.total*100) + '%';
            };

            xhr.onload = () => {
                if(xhr.status === 200) {
                    alert("Berhasil! Memperbarui brankas...");
                    window.location.reload(); 
                } else { alert("Gagal mengunggah."); }
                upBtn.disabled = false;
            };
            xhr.open("POST", "/sys-exec-push");
            xhr.send(formData);
        };
    }

    function renderVault() {
        const li = document.getElementById('li');
        if(!li) return;
        li.innerHTML = _DATA.length ? '' : '<div style="grid-column:1/-1; text-align:center; padding:100px; color:var(--dim);">Kosong.</div>';
        
        _DATA.forEach(i => {
            const isImg = i.type && i.type.startsWith('image/');
            const d = document.createElement('div');
            d.className = 'item';
            d.innerHTML = `
                <div class="thumb">${isImg ? '<img src="'+i.url+'" loading="lazy">' : '<span style="font-size:50px">📄</span>'}</div>
                <div style="font-weight:800; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${i.name}</div>
                <div style="font-size:11px; color:var(--dim); margin-top:5px">${new Date(i.time).toLocaleString()}</div>
                <a href="${i.url}" target="_blank" style="display:block; background:var(--primary); color:#000; text-align:center; padding:12px; border-radius:12px; text-decoration:none; font-weight:800; font-size:12px; margin-top:15px">BUKA</a>
            `;
            li.appendChild(d);
        });
    }

    // Inisialisasi awal
    document.addEventListener('DOMContentLoaded', () => {
        tampil('home');
    });
</script>
</body>
</html>
