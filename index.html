<!DOCTYPE html><html lang="id" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>INS Cloud | Unlimited Storage</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script><style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background:#050505; color:#fafafa; }
.glass { background: rgba(15,15,18,.6); backdrop-filter: blur(14px); border:1px solid rgba(255,255,255,.06); }
.nav-link.active { background:#fbbf24; color:#000; }
.tab-content { display:none; }
.tab-content.active { display:block; }
</style></head><body><!-- LOGIN LAYER --><div id="authLayer" class="fixed inset-0 bg-black flex items-center justify-center z-[999]">
  <div class="glass p-10 rounded-[2rem] w-full max-w-md">
    <h2 class="text-2xl font-black mb-6 text-center">Login INS Cloud</h2>
    <form id="loginForm" class="space-y-4">
      <input id="username" type="text" placeholder="Username"
        class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-5 py-4 text-white" required>
      <button class="w-full bg-amber-500 text-black py-4 rounded-xl font-bold">
        Masuk
      </button>
    </form>
  </div>
</div><div class="min-h-screen flex"><!-- SIDEBAR --><aside class="w-64 glass p-6 flex flex-col gap-6">
  <h1 class="text-xl font-black">INS CLOUD</h1><button onclick="switchTab('dashboard')" class="nav-link active" id="btn-dashboard">Dashboard</button>
<button onclick="switchTab('upload')" class="nav-link" id="btn-upload">Upload</button>
<button onclick="switchTab('history')" class="nav-link" id="btn-history">Files</button>

<button onclick="logout()" class="mt-auto text-red-500">Logout</button>

</aside><!-- MAIN --><main class="flex-1 p-6"><!-- DASHBOARD --><section id="view-dashboard" class="tab-content active">
  <h1 class="text-3xl font-black mb-6" id="welcome">Halo</h1>
  <p>Total file: <span id="stat-files">0</span></p>
</section><!-- UPLOAD --><section id="view-upload" class="tab-content">
  <input type="file" id="fileInput">
  <button id="uploadBtn" class="bg-amber-500 text-black px-6 py-3 mt-4">Upload</button>  <div id="result" class="mt-6 hidden">
    <input id="finalUrl" class="w-full bg-zinc-900 p-3">
  </div>
</section><!-- HISTORY --><section id="view-history" class="tab-content">
  <div id="history"></div>
</section></main>
</div><script>
lucide.createIcons();

let currentUser = localStorage.getItem("ins_user");

// ================= AUTH =================
function initAuth() {
  if (!currentUser) {
    document.getElementById("authLayer").style.display = "flex";
  } else {
    document.getElementById("authLayer").style.display = "none";
    document.getElementById("welcome").innerHTML =
      "Halo, <span class='text-amber-500'>" + currentUser + "</span>";
  }
}

document.getElementById("loginForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const u = document.getElementById("username").value.trim();
  if (!u) return;

  localStorage.setItem("ins_user", u);
  currentUser = u;
  initAuth();
});

function logout() {
  localStorage.removeItem("ins_user");
  location.reload();
}

// ================= NAV =================
function switchTab(tab) {
  document.querySelectorAll(".tab-content").forEach(e => e.classList.remove("active"));
  document.querySelectorAll(".nav-link").forEach(e => e.classList.remove("active"));

  document.getElementById("view-" + tab).classList.add("active");
  document.getElementById("btn-" + tab).classList.add("active");

  if (tab === "history") loadHistory();
}

// ================= UPLOAD =================
document.getElementById("uploadBtn").onclick = async () => {
  if (!currentUser) return alert("Login dulu!");

  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Pilih file!");

  const fd = new FormData();
  fd.append("file", file);
  fd.append("user_id", currentUser);

  const res = await fetch("/upload-send", {
    method: "POST",
    body: fd
  });

  const data = await res.json();

  if (res.ok) {
    const url = data.media_url || data.url || "/media/" + data.evo_data;

    document.getElementById("finalUrl").value = url;
    document.getElementById("result").classList.remove("hidden");

    saveHistory({ name: file.name, url });
  } else {
    alert("Upload gagal");
  }
};

// ================= HISTORY =================
function saveHistory(item) {
  let h = JSON.parse(localStorage.getItem("ins_history") || "[]");
  h.unshift(item);
  localStorage.setItem("ins_history", JSON.stringify(h));
  updateStats();
}

function loadHistory() {
  let h = JSON.parse(localStorage.getItem("ins_history") || "[]");
  const el = document.getElementById("history");
  el.innerHTML = "";

  h.forEach(i => {
    const d = document.createElement("div");
    d.innerHTML = `<a href="${i.url}" target="_blank">${i.name}</a>`;
    el.appendChild(d);
  });
}

function updateStats() {
  let h = JSON.parse(localStorage.getItem("ins_history") || "[]");
  document.getElementById("stat-files").textContent = h.length;
}

// ================= INIT =================
initAuth();
updateStats();
</script></body>
</html>
